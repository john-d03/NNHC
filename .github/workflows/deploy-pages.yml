name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nnhc-site/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: nnhc-site
        run: npm ci

      - name: Build static site
        working-directory: nnhc-site
        run: npm run build

      - name: Add CNAME
        run: |
          if [ -f CNAME ]; then
            cp CNAME nnhc-site/out/CNAME
          else
            echo "CNAME not found at repository root; skipping."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nnhc-site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
